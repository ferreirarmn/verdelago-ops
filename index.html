<!doctype html>
<html lang="pt">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Verdelago Operações</title>
<link rel="stylesheet" href="estilo.css">
<link rel="manifest" href="manifest.json">

<!-- Biblioteca de login Microsoft (mesma versão das apps atuais) -->
<script src="https://alcdn.msauth.net/browser/2.38.3/js/msal-browser.min.js"></script>
</head>
<body>

<!-- Porta de entrada: visível antes do login -->
<div id="login-gate">
  <h1>Verdelago Operações</h1>
  <p>Aplicação de gestão de pessoas, zonas e escalas. Inicie sessão com a sua conta Microsoft 365.</p>
  <button id="btn-entrar">Entrar com Microsoft 365</button>
  <div id="login-status"></div>
</div>

<!-- A aplicação (escondida até ao login) -->
<div id="app" style="display:none">
  <header class="barra">
    <span class="marca">Verdelago Operações</span>
    <div class="dir">
      <span id="utilizador"></span>
      <span id="sync-badge"></span>
    </div>
  </header>
  <nav id="nav"></nav>
  <main id="conteudo"></main>
</div>

<!-- Arranque (módulos ES) -->
<script type="module" src="app.js"></script>
</body>
</html>
