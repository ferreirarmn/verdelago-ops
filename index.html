<!doctype html>
<html lang="pt">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Verdelago Operações</title>
<meta name="theme-color" content="#0c4b46">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Verdelago Ops">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" href="icon-192.png">
<link rel="stylesheet" href="estilo.css">
<link rel="manifest" href="manifest.json">

<!-- Biblioteca de login Microsoft (local, por causa do bloqueio CORB da rede) -->
<script src="lib/msal-browser.min.js"></script>
</head>
<body>

<!-- Porta de entrada: visível antes do login -->
<div id="login-gate">
  <h1>Verdelago Operações</h1>
  <p>Gestão operacional, orçamento de pessoal e controlo de gestão da unidade. Inicie sessão com a sua conta Microsoft 365.</p>
  <button id="btn-entrar">Entrar com Microsoft 365</button>
  <div id="login-status"></div>
</div>

<!-- A aplicação (escondida até ao login) -->
<div id="app" style="display:none">

  <!-- Barra lateral: marca + navegação agrupada -->
  <aside id="lateral">
    <div class="marca-bloco">
      <svg class="marca-logo" viewBox="0 0 34 34" fill="none" aria-hidden="true">
        <circle cx="17" cy="17" r="15.5" stroke="#d6b887" stroke-width="1.4" opacity=".55"/>
        <circle cx="17" cy="17" r="10" stroke="#d6b887" stroke-width="1.4" opacity=".8"/>
        <circle cx="17" cy="17" r="4" fill="#d6b887"/>
      </svg>
      <div class="marca-txt">
        <b>Verdelago</b>
        <span>Operações</span>
      </div>
    </div>
    <nav id="nav"></nav>
    <div class="lateral-fundo" id="lateral-info">Blue &amp; Green · Resort Verdelago</div>
  </aside>

  <!-- Coluna de conteúdo: topbar contextual + módulo ativo -->
  <div class="coluna">
    <header class="barra">
      <button id="btn-menu" aria-label="Abrir menu">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M4 7h16M4 12h16M4 17h16"/></svg>
      </button>
      <span class="contexto" id="contexto"></span>
      <span class="unidade-chip">Verdelago</span>
      <div class="dir">
        <span id="sync-badge"></span>
        <span id="utilizador"></span>
      </div>
    </header>
    <main id="conteudo"></main>
  </div>

  <div id="backdrop"></div>
</div>

<!-- Arranque (módulos ES) -->
<script type="module" src="app.js"></script>

<!-- Service worker: torna a app instalável (ícone, ecrã inteiro) -->
<script>
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => {
      navigator.serviceWorker.register("sw.js").catch(() => {});
    });
  }
</script>
</body>
</html>
