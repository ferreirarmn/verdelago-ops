<!doctype html>
<html lang="pt">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Verdelago Operações</title>
<meta name="theme-color" content="#0E5C63">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Verdelago Ops">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" href="icon-192.png">
<link rel="stylesheet" href="estilo.css">
<link rel="manifest" href="manifest.json">

<!-- Biblioteca de login Microsoft (local, por causa do bloqueio CORB da rede) -->
<script src="lib/msal-browser.min.js"></script>
</head>
<body>

<!-- Porta de entrada: visível antes do login -->
<div id="login-gate">
  <h1>Verdelago Operações</h1>
  <p>Aplicação de gestão de pessoas, zonas e escalas. Inicie sessão com a sua conta Microsoft 365.</p>
  <button id="btn-entrar">Entrar com Microsoft 365</button>
  <div id="login-status"></div>
</div>

<!-- A aplicação (escondida até ao login) -->
<div id="app" style="display:none">
  <header class="barra">
    <span class="marca">Verdelago Operações</span>
    <div class="dir">
      <span id="utilizador"></span>
      <span id="sync-badge"></span>
    </div>
  </header>
  <nav id="nav"></nav>
  <main id="conteudo"></main>
</div>

<!-- Arranque (módulos ES) -->
<script type="module" src="app.js"></script>

<!-- Service worker: torna a app instalável (ícone, ecrã inteiro) -->
<script>
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => {
      navigator.serviceWorker.register("sw.js").catch(() => {});
    });
  }
</script>
</body>
</html>
